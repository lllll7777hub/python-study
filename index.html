<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Python 零基础学堂</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

:root{
  --p:#6366f1;--p2:#a855f7;--s:#10b981;--w:#f59e0b;--e:#ef4444;
  --bg:#f0f2f5;--c:#ffffff;--b:#e8ecf1;--t:#0f172a;--t2:#5b6e8c;--t3:#94a3b8;
  --code:#111827;--r:16px;--r2:12px;--r3:8px;
  --g1:linear-gradient(135deg,#6366f1,#a855f7);
  --g2:linear-gradient(135deg,#10b981,#059669);
  --f:'Inter',-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  --fm:'JetBrains Mono','Fira Code',Consolas,'Courier New',monospace;
  --sh1:0 1px 3px rgba(0,0,0,.04),0 2px 8px rgba(0,0,0,.04);
  --sh2:0 4px 16px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.04);
  --trans:all .2s cubic-bezier(.4,0,.2,1);
}
.dark{
  --bg:#090d16;--c:#131a2b;--b:#232d42;--t:#e2e8f0;--t2:#94a3b8;--t3:#556070;
  --code:#070b14;
  --sh1:0 1px 3px rgba(0,0,0,.3),0 2px 8px rgba(0,0,0,.25);
  --sh2:0 4px 20px rgba(0,0,0,.4),0 2px 8px rgba(0,0,0,.3);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:var(--f);background:var(--bg);color:var(--t);overflow:hidden;letter-spacing:-.01em}
.app{display:flex;flex-direction:column;height:100dvh;max-width:100%}

.topbar{display:flex;align-items:center;gap:10px;padding:0 18px;height:52px;flex-shrink:0;background:var(--c);border-bottom:1px solid var(--b);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 1px 2px rgba(0,0,0,.02)}
.topbar .logo{font-size:22px;filter:drop-shadow(0 2px 4px rgba(99,102,241,.3))}
.topbar h1{font-size:16px;font-weight:800;background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.02em}
.topbar .sp{flex:1}
.topbar .badge{font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;background:linear-gradient(135deg,rgba(16,185,129,.1),rgba(16,185,129,.05));color:var(--s);cursor:pointer;user-select:none;border:1px solid rgba(16,185,129,.15);transition:var(--trans)}
.topbar .badge:hover{box-shadow:0 0 0 4px rgba(16,185,129,.1)}
.topbar .icon-btn{width:36px;height:36px;border:1px solid var(--b);border-radius:12px;background:var(--c);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:var(--trans)}
.topbar .icon-btn:hover{background:var(--bg);border-color:var(--p);box-shadow:0 0 0 4px rgba(99,102,241,.08)}
.topbar .icon-btn:active{transform:scale(.93)}

.tab-bar{display:none;border-bottom:1px solid var(--b);background:var(--c);backdrop-filter:blur(8px)}
@media(max-width:768px){.tab-bar{display:flex}}
.tab-bar button{flex:1;padding:12px;border:none;background:none;font-size:13px;font-weight:700;color:var(--t3);cursor:pointer;font-family:inherit;position:relative;transition:var(--trans)}
.tab-bar button:hover{color:var(--p);background:rgba(99,102,241,.03)}
.tab-bar button.on{color:var(--p)}
.tab-bar button.on::after{content:'';position:absolute;bottom:0;left:35%;right:35%;height:2.5px;background:var(--g1);border-radius:2px}

.wrap{flex:1;display:flex;overflow:hidden}
.panel{flex:1;overflow-y:auto;overflow-x:hidden;background:var(--c);padding:20px 18px;scroll-behavior:smooth}
.panel.hide{display:none}
.panel::-webkit-scrollbar{width:4px}
.panel::-webkit-scrollbar-thumb{background:var(--b);border-radius:4px}

.hero{background:var(--g1);border-radius:var(--r);padding:24px;color:#fff;margin-bottom:20px;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(99,102,241,.2)}
.hero::before{content:'';position:absolute;top:-40px;right:-30px;width:140px;height:140px;border:2px solid rgba(255,255,255,.1);border-radius:50%}
.hero::after{content:'';position:absolute;bottom:-50px;left:20%;width:200px;height:200px;background:radial-gradient(circle,rgba(255,255,255,.06) 0%,transparent 70%)}
.hero h2{font-size:20px;margin-bottom:6px;font-weight:900;letter-spacing:-.03em;position:relative;z-index:1}
.hero p{font-size:13px;opacity:.85;line-height:1.7;position:relative;z-index:1}
.hero .btn{display:inline-flex;gap:6px;align-items:center;margin-top:12px;padding:9px 20px;background:rgba(255,255,255,.12);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);border-radius:20px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:var(--trans);position:relative;z-index:1}
.hero .btn:hover{background:rgba(255,255,255,.2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.1)}

.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.chip{padding:6px 12px;border-radius:16px;font-size:11px;font-weight:700;border:1px solid var(--b);background:var(--c);cursor:pointer;color:var(--t2);font-family:inherit;transition:var(--trans)}
.chip:hover{border-color:var(--p);color:var(--p);transform:translateY(-1px)}
.chip:active{transform:scale(.95)}
.chip.done{background:linear-gradient(135deg,rgba(16,185,129,.08),rgba(16,185,129,.03));border-color:rgba(16,185,129,.25);color:var(--s)}
.chip.on{border-color:var(--p);color:#fff;background:var(--g1);box-shadow:0 2px 8px rgba(99,102,241,.25)}

.sec h3{font-size:16px;font-weight:800;color:var(--t);margin:18px 0 8px;display:flex;align-items:center;gap:8px;letter-spacing:-.02em}
.sec h3::before{content:'';display:inline-block;width:4px;height:20px;background:var(--g1);border-radius:2px}
.sec p{font-size:14px;line-height:1.85;color:var(--t2);margin-bottom:10px}
.sec pre{background:var(--code);color:#e2e8f0;padding:14px 16px;border-radius:var(--r2);font:13px/1.7 var(--fm);overflow-x:auto;margin:10px 0;box-shadow:var(--sh2);border:1px solid rgba(255,255,255,.04)}
.sec code.kbd{background:rgba(99,102,241,.08);color:var(--p);padding:2px 6px;border-radius:5px;font-size:12px;font-weight:600;font-family:var(--fm)}

.box{border-radius:var(--r2);padding:12px 14px;margin:12px 0;font-size:13px;line-height:1.7;display:flex;gap:8px;align-items:flex-start}
.box .ico{font-size:16px;flex-shrink:0;margin-top:1px}
.box.tip{background:linear-gradient(135deg,rgba(16,185,129,.06),rgba(16,185,129,.02));border:1px solid rgba(16,185,129,.15);color:#065f46}
.box.warn{background:linear-gradient(135deg,rgba(245,158,11,.06),rgba(245,158,11,.02));border:1px solid rgba(245,158,11,.15);color:#92400e}
.box.info{background:linear-gradient(135deg,rgba(99,102,241,.06),rgba(99,102,241,.02));border:1px solid rgba(99,102,241,.15);color:#1e40af}
.dark .box.tip{color:#6ee7b7}.dark .box.warn{color:#fcd34d}.dark .box.info{color:#a5b4fc}

.goal{margin-bottom:12px}
.goal .g{display:flex;gap:10px;align-items:center;font-size:13px;padding:4px 0;color:var(--t2);font-weight:600}
.goal .g::before{content:'';display:inline-block;width:6px;height:6px;background:var(--p);border-radius:50%;flex-shrink:0}

.step{padding:10px 12px;margin:4px 0;display:flex;gap:12px;border-radius:var(--r2);transition:var(--trans)}
.step:hover{background:rgba(99,102,241,.03)}
.step .n{width:30px;height:30px;border-radius:50%;background:var(--g1);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;box-shadow:0 2px 8px rgba(99,102,241,.25)}
.step b{font-size:13px;display:block;margin-bottom:2px;color:var(--t)}
.step span{font-size:12px;color:var(--t2)}

.editor{background:var(--code);border-radius:var(--r2);overflow:hidden;display:flex;flex-direction:column;flex:1;min-height:0;box-shadow:var(--sh2);border:1px solid rgba(255,255,255,.03)}
.ed-top{display:flex;align-items:center;padding:8px 14px;background:rgba(255,255,255,.02);border-bottom:1px solid rgba(255,255,255,.04);gap:8px}
.ed-top .dot{width:10px;height:10px;border-radius:50%;box-shadow:0 0 6px rgba(0,0,0,.2)}
.ed-top .dot:nth-child(1){background:#ff5f57}
.ed-top .dot:nth-child(2){background:#febc2e}
.ed-top .dot:nth-child(3){background:#28c840}
.ed-top .fn{font-size:11px;color:#5b6e8c;font-family:var(--fm);font-weight:600;margin-left:6px}
.ed-top .sp{flex:1}
.ed-top button{background:none;border:none;color:#5b6e8c;font-size:15px;cursor:pointer;padding:3px 7px;border-radius:5px;font-family:var(--fm);transition:var(--trans)}
.ed-top button:hover{background:rgba(255,255,255,.06);color:#94a3b8}
.ed-body{flex:1;display:flex;overflow:hidden}
.ln{width:46px;background:rgba(0,0,0,.12);color:#5b6e8c;font-family:var(--fm);font-size:12px;padding:12px 0;text-align:right;user-select:none;line-height:1.7;overflow:hidden;border-right:1px solid rgba(255,255,255,.03)}
.ln span{display:block;padding-right:10px}
.cw{flex:1;position:relative}
.cw textarea{width:100%;height:100%;background:transparent;color:transparent;border:none;outline:none;resize:none;font:14px/1.7 var(--fm);padding:12px 14px;tab-size:4;caret-color:#facc15;position:absolute;inset:0;z-index:2}
.cw textarea::placeholder{color:#3b4a60}
.cw .hl-box{position:absolute;inset:0;padding:12px 14px;font:14px/1.7 var(--fm);white-space:pre-wrap;pointer-events:none;z-index:1;overflow:hidden;color:transparent}
.cw .hl-kw{color:#93c5fd;font-weight:600}.cw .hl-str{color:#86efac}.cw .hl-cm{color:#556070;font-style:italic}.cw .hl-fn{color:#fde68a}.cw .hl-num{color:#c084fc}

.console{background:rgba(0,0,0,.25);color:#94a3b8;font:12px/1.7 var(--fm);padding:12px 14px;max-height:140px;overflow-y:auto;white-space:pre-wrap;flex-shrink:0;border-top:1px solid rgba(255,255,255,.03)}
.console .out{color:#86efac}.console .err{color:#fca5a5}.console .info{color:#93c5fd}.console .ok{color:#34d399;font-weight:700}.console .hint{color:#fde68a}

.acts{display:flex;gap:6px;padding:8px 12px;flex-wrap:wrap;flex-shrink:0;background:rgba(0,0,0,.08)}
.acts button,.panel-acts button{padding:8px 15px;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:var(--trans);letter-spacing:.01em}
.acts button:hover,.panel-acts button:hover{transform:translateY(-1px)}
.acts button:active,.panel-acts button:active{transform:scale(.95)}
.acts button:disabled,.panel-acts button:disabled{opacity:.3;pointer-events:none;filter:grayscale(.3)}
.btn-run{background:var(--g2);color:#fff;box-shadow:0 2px 10px rgba(16,185,129,.3)}
.btn-run:hover{box-shadow:0 4px 16px rgba(16,185,129,.45)}
.btn-reset{background:rgba(71,85,105,.8);color:#e2e8f0}
.btn-reset:hover{background:rgba(71,85,105,1)}
.btn-hint{background:linear-gradient(135deg,#92400e,#78350f);color:#fde68a}
.btn-hint:hover{box-shadow:0 4px 12px rgba(146,64,14,.4)}
.btn-ai{background:rgba(99,102,241,.2);color:#a5b4fc}
.btn-ai:hover{background:rgba(99,102,241,.3);box-shadow:0 0 0 4px rgba(99,102,241,.08)}
.btn-next{background:var(--g1);color:#fff;box-shadow:0 2px 10px rgba(99,102,241,.3)}
.btn-next:hover{box-shadow:0 4px 16px rgba(99,102,241,.45)}

.panel-acts{margin-top:12px;display:flex;gap:6px}
.panel-acts .btn-run{flex:1}

.stats{display:flex;gap:20px;font-size:11px;color:var(--t3);padding:6px 14px;background:rgba(0,0,0,.06);flex-shrink:0;font-family:var(--fm)}
.stats b{color:var(--t);font-weight:600}

.ai-box{background:var(--c);border:1px solid var(--b);border-radius:var(--r2);padding:14px;margin:10px 12px 0;display:none;box-shadow:var(--sh2)}
.ai-box.show{display:block;animation:slideIn .2s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.ai-box h4{font-size:14px;font-weight:800;color:var(--p);margin-bottom:8px}
.ai-box .ai-msg{background:var(--bg);border-radius:var(--r3);padding:10px 12px;font-size:12px;line-height:1.7;max-height:140px;overflow-y:auto;margin-bottom:8px}
.ai-box .ai-row{display:flex;gap:6px}
.ai-box input{flex:1;padding:9px 12px;border:1px solid var(--b);border-radius:10px;font-size:13px;font-family:inherit;outline:none;background:var(--bg);color:var(--t);transition:var(--trans)}
.ai-box input:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(99,102,241,.08)}
.ai-box button{padding:9px 16px;background:var(--g1);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:var(--trans)}
.ai-box button:hover{box-shadow:0 4px 12px rgba(99,102,241,.3)}

.dash-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:900;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.dash-bg.show{display:flex}
.dash{background:var(--c);width:100%;max-width:480px;max-height:80vh;border-radius:20px 20px 0 0;padding:24px;overflow-y:auto;animation:up .3s ease;box-shadow:0 -8px 40px rgba(0,0,0,.15);border:1px solid var(--b);border-bottom:none}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.dash h3{font-size:18px;margin-bottom:16px;font-weight:900;letter-spacing:-.02em}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.dash-card{background:var(--bg);border-radius:var(--r2);padding:16px;text-align:center;border:1px solid var(--b);transition:var(--trans)}
.dash-card:hover{box-shadow:var(--sh1);border-color:var(--p)}
.dash-card .v{font-size:28px;font-weight:900;background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.dash-card .l{font-size:11px;color:var(--t3);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.dash-progress{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.dash-progress span{width:20px;height:20px;border-radius:6px;background:var(--b);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:var(--t3);transition:var(--trans)}
.dash-progress span.done{background:var(--g2);color:#fff;box-shadow:0 2px 6px rgba(16,185,129,.25)}
.dash-close{display:block;margin:14px auto 0;padding:10px 28px;background:var(--g1);color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-family:inherit;font-size:13px;transition:var(--trans);box-shadow:0 2px 8px rgba(99,102,241,.2)}
.dash-close:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(99,102,241,.35)}

.ach-bar{display:flex;flex-wrap:wrap;gap:5px;padding:8px 12px}
.ach-badge{padding:4px 10px;border-radius:12px;font-size:10px;font-weight:700;opacity:.3;border:1px solid var(--b);background:var(--c);transition:var(--trans)}
.ach-badge.got{opacity:1;border-color:var(--s);background:linear-gradient(135deg,rgba(16,185,129,.1),rgba(16,185,129,.03));color:var(--s)}
.ach-pop{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--c);border:1px solid var(--b);border-radius:14px;padding:14px 20px;box-shadow:var(--sh2);z-index:500;font-size:14px;font-weight:700;display:flex;gap:8px;align-items:center;animation:d-in .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes d-in{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.fab{position:fixed;right:18px;width:46px;height:46px;border-radius:50%;border:1px solid var(--b);background:var(--c);font-size:19px;cursor:pointer;box-shadow:var(--sh2);z-index:100;display:flex;align-items:center;justify-content:center;transition:var(--trans)}
.fab:hover{transform:scale(1.08);border-color:var(--p);box-shadow:0 4px 20px rgba(99,102,241,.15)}
.fab:active{transform:scale(.95)}
.fab.theme{bottom:22px}
.fab.dash{bottom:78px}

.cf-p{position:fixed;inset:0;pointer-events:none;z-index:999}
.cf-p span{position:absolute;display:block;animation:drop 2.2s ease-out forwards;border-radius:2px}
@keyframes drop{0%{transform:translateY(-100vh) rotate(0)}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

@media(min-width:769px){
  .app{flex-direction:row;flex-wrap:wrap}
  .topbar{width:100%}
  .tab-bar{display:none}
  #panel-lesson{width:460px;min-width:340px;border-right:1px solid var(--b);max-width:50vw}
  #panel-editor{width:auto;flex:1;padding:0;display:flex!important;flex-direction:column!important}
  #panel-editor.hide{display:none!important}
  .editor{border-radius:0}
  #panel-editor .panel-acts{display:none}
}

.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--t);color:var(--c);padding:9px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:200;pointer-events:none;animation:t-in .4s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 24px rgba(0,0,0,.2)}
@keyframes t-in{from{opacity:0;transform:translateX(-50%) translateY(-12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

::selection{background:rgba(99,102,241,.2);color:var(--t)}
button:focus-visible{outline:2px solid var(--p);outline-offset:2px;border-radius:4px}
</style>
</style>
</head>
<body id="root">
<div class="app">
  <div class="topbar">
    <span class="logo">🐍</span><h1>Python 零基础学堂</h1>
    <span class="sp"></span>
    <span class="badge" onclick="openDash()" id="badgePct">0/20</span>
    <button class="icon-btn" onclick="toggleTheme()" id="themeBtn" title="深色/浅色">🌙</button>
  </div>
  <div class="tab-bar">
    <button class="on" id="tbLsn" onclick="swTab('lesson')">📚 课程</button>
    <button id="tbEd" onclick="swTab('editor')">💻 写代码</button>
  </div>
  <div class="wrap">
    <div class="panel" id="panel-lesson"></div>
    <div class="panel hide" id="panel-editor" style="padding:0;display:flex;flex-direction:column">
      <div class="panel-acts" style="padding:8px 12px 0">
        <button class="btn-run" onclick="exec()">▶ 运行</button>
        <button class="btn-reset" onclick="reset()">↺ 重置</button>
        <button class="btn-hint" id="hintBtn" onclick="hint()">💡 提示</button>
        <button class="btn-ai" onclick="toggleAI()">🤖</button>
        <span style="flex:1"></span>
        <button class="btn-next" id="nextBtn" onclick="next()" disabled>下一课</button>
      </div>
      <div class="editor">
        <div class="ed-top">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
          <span class="fn">main.py</span><span class="sp"></span>
          <button onclick="fmt()" title="格式化">▦</button>
          <button onclick="cpy()" title="复制">📋</button>
        </div>
        <div class="ed-body">
          <div class="ln" id="lnEl"></div>
          <div class="cw">
            <textarea id="codeEl" placeholder="# Python 3 · 写代码，Ctrl+Enter 运行" spellcheck="false"></textarea>
            <div class="hl-box" id="hlEl"></div>
          </div>
        </div>
      </div>
      <div class="acts">
        <button class="btn-run" onclick="exec()">▶ 运行</button>
        <button class="btn-reset" onclick="reset()">↺ 重置</button>
        <button class="btn-hint" id="hintBtn2" onclick="hint()">💡 提示</button>
        <button class="btn-ai" onclick="toggleAI()">🤖 问老师</button>
        <span style="flex:1"></span>
        <button class="btn-next" id="nextBtn2" onclick="next()" disabled>下一课 →</button>
      </div>
      <div class="console" id="conEl">▶ 点击「运行」执行代码 · Ctrl+Enter</div>
      <div class="ai-box" id="aiBox">
        <h4>🤖 AI 学习助手</h4>
        <div class="ai-msg" id="aiMsg">你好！有什么问题直接问，我帮你~</div>
        <div class="ai-row">
          <input id="aiIn" placeholder="比如：我的代码为什么报错？" onkeydown="if(event.key==='Enter')askAI()">
          <button onclick="askAI()">发送</button>
        </div>
      </div>
      <div class="stats">
        <span>已运行 <b id="statRuns">0</b></span><span>已通过 <b id="statDone">0</b></span><span>正确率 <b id="statAcc">--</b></span>
      </div>
    </div>
  </div>
</div>
<div class="ach-bar" id="achBar"></div>
<div class="dash-bg" id="dashBg" onclick="closeDash()">
  <div class="dash" onclick="event.stopPropagation()">
    <h3>📊 学习报告</h3>
    <div class="dash-grid">

let cur=0,mode='learn',prog={done:0,hints:{}},totalRuns=0,totalOK=0,hintUsed={},achGot={},startTm=0;
const S='pl3', AS='pl3_ach';
function load(){try{let d=JSON.parse(localStorage[S]||'{}');if(d.done!=null)prog=d}catch(e){};try{achGot=JSON.parse(localStorage[AS]||'{}')}catch(e){} }
function save(){localStorage[S]=JSON.stringify(prog);localStorage[AS]=JSON.stringify(achGot)}
let dark=false;

function swTab(t){

  document.getElementById('panel-lesson').classList.toggle('hide',!isLes);

function highlight(t){
  let h=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h=h.replace(/(#.*)/g,'<span class="hl-cm">$1</span>');
  h=h.replace(/(["'])(?:(?=(\\?))\2.)*?\1/g,'<span class="hl-str">$&</span>');
  'def|class|if|elif|else|for|while|in|return|import|from|as|try|except|finally|with|and|or|not|is|pass|break|continue'.split('|').forEach(k=>h=h.replace(new RegExp('\\b'+k+'\\b','g'),'<span class="hl-kw">$&</span>'));
  'print|int|float|str|list|dict|set|tuple|range|input|len|append|upper|lower|replace|count|split|join|strip|sum|min|max|abs|round'.split('|').forEach(b=>h=h.replace(new RegExp('\\b('+b+')\\s*\\(','g'),'<span class="hl-fn">$1</span>('));
  h=h.replace(/\b(True|False|None)\b/g,'<span class="hl-num">$&</span>');
  h=h.replace(/\b(\d+\.?\d*)\b/g,'<span class="hl-num">$1</span>');
  return h;
}

function updHL(){

}

function fmt(){

  });

function execPy(code){
  let p=code.replace(/#.*/g,'').replace(/print\((.*)\)/g,'_p($1)').replace(/input\((.*)\)/g,'_in($1)');
  p=p.replace(/import re\n?/g,'');
  p=p.replace(/re\.findall\(r'([^']*)',\s*(.+?)\)/g,'($2.match(new RegExp(String.raw`$1`,"g"))||[])');
  p=p.replace(/re\.findall\(r"([^"]*)",\s*(.+?)\)/g,'($2.match(new RegExp(String.raw`$1`,"g"))||[])');
  p=p.replace(/re\.sub\(r'([^']*)',\s*'([^']*)',\s*(.+?)\)/g,'$3.replace(new RegExp(String.raw`$1`,"g"),"$2")');
  p=p.replace(/import json\n?/g,'');
  p=p.replace(/json\.loads\((.+?)\)/g,'JSON.parse($1)');
  p=p.replace(/json\.dumps\((.+?)\)/g,'JSON.stringify($1)');
  p=p.replace(/import math\n?/g,'');
  p=p.replace(/math\.sqrt\((.+?)\)/g,'Math.sqrt($1)');
  p=p.replace(/math\.pi\b/g,'Math.PI');
  p=p.replace(/math\.ceil\((.+?)\)/g,'Math.ceil($1)');
  p=p.replace(/math\.floor\((.+?)\)/g,'Math.floor($1)');
  p=p.replace(/import random\n?/g,'');
  p=p.replace(/random\.randint\((\d+),(\d+)\)/g,'Math.floor(Math.random()*($2-$1+1))+$1');
  p=p.replace(/random\.random\(\)/g,'Math.random()');
  p=p.replace(/random\.choice\((.+?)\)/g,'$1[Math.floor(Math.random()*$1.length)]');
  p=p.replace(/from datetime import datetime\n?/g,'');
  p=p.replace(/datetime\.now\(\)\.strftime\((.+?)\)/g,'_dtf(new Date(),$1)');
  p=p.replace(/datetime\.now\(\)/g,'new Date()');
  p=p.replace(/int\((.*)\)/g,'parseInt($1)');
  p=p.replace(/float\((.*)\)/g,'parseFloat($1)');
  p=p.replace(/(\w+)\.append\((.*)\)/g,'$1.push($2)');
  p=p.replace(/(\w+)\.upper\(\)/g,'$1.toUpperCase()');
  p=p.replace(/(\w+)\.lower\(\)/g,'$1.toLowerCase()');
  p=p.replace(/(\w+)\.replace\(([^,]+),\s*([^)]+)\)/g,'$1.replaceAll($2,$3)');
  p=p.replace(/range\((\d+),\s*(\d+)\)/g,'Array.from({length:$2-$1},(_,i)=>i+$1)');
  p=p.replace(/range\((\d+)\)/g,'Array.from({length:$1},(_,i)=>i)');
  p=p.replace(/len\((\w+)\)/g,'$1.length');
  p=p.replace(/elif /g,'else if ');
  p=p.replace(/def (\w+)\(([^)]*)\):/g,'function $1($2){');
  p=p.replace(/:$/gm,'{');
  p=p.replace(/True/g,'true');p=p.replace(/False/g,'false');p=p.replace(/None/g,'null');
  p=p.replace(/\band\b/g,'&&');p=p.replace(/\bor\b/g,'||');
  p=p.replace(/for (\w+) in (\w+):/g,'for(let $1 of $2){');
  let bc=0;const ls=p.split('\n').map(l=>{if(!l.trim())return l;bc+=(l.match(/\{/g)||[]).length;bc-=(l.match(/\}/g)||[]).length;return l});
  for(let i=0;i<bc;i++)ls.push('}');
  p=ls.join('\n');
  const sb='const _o=[];const _p=(...a)=>_o.push(a.join(" "));const _in=p=>{try{let v=prompt(p||"输入：","");return v===null?"":v}catch(e){return""}};const _fw=(n,c)=>{try{localStorage.setItem("_f_"+n,String(c))}catch(e){}};const _fr=n=>{try{return localStorage.getItem("_f_"+n)||""}catch(e){return""}};const _dtf=(d,f)=>{try{const y=d.getFullYear(),m=d.getMonth()+1,da=d.getDate(),h=d.getHours(),mn=d.getMinutes(),s=d.getSeconds();let r=f.replace("%Y",y).replace("%m",String(m).padStart(2,"0")).replace("%d",String(da).padStart(2,"0")).replace("%H",String(h).padStart(2,"0")).replace("%M",String(mn).padStart(2,"0")).replace("%S",String(s).padStart(2,"0"));return r}catch(e){return""}};try{'+p+'}catch(e){_o.push("ERR:"+e.message)}return _o.join("\\n");';
  try{const fn=new Function(sb);const r=fn();return r.startsWith('ERR:')?{ok:false,err:r.slice(4)}:{ok:true,out:r}}
  catch(e){return{ok:false,err:e.message}}
}

function trErr(m){
  if(!m)return'未知错误';
  const t=[{p:/SyntaxError|unexpected/i,m:'语法错误：检查括号/引号/冒号',tip:'if后写冒号，括号要成对'},{p:/not defined/i,m:'名称错误：变量没定义或拼错',tip:'先赋值再用'},{p:/cannot read|null/i,m:'属性错误：方法不存在',tip:'数字没有.upper()'},{p:/infinite/i,m:'可能无限循环',tip:'检查range()'},{p:/zero/i,m:'除零错误',tip:'分母不能是0'},{p:/NaN/i,m:'数值错误',tip:'用int()/float()转换'}];
  for(let e of t)if(e.p.test(m))return'❌ '+e.m+'\n💡 '+e.tip;
  let s=String(m).split('\n')[0]||'未知错误';
  return'❌ '+s+'\n💡 检查代码';
}

function exec(){
  const code=document.getElementById('codeEl').value.trim();
  const ce=document.getElementById('conEl');
  if(!code){ce.innerHTML='<span class="err">请先输入代码</span>';return}
  ce.innerHTML='<span class="info">⏳ 运行中...</span>';
  setTimeout(()=>{
    totalRuns++;const r=execPy(code);
    if(r.ok){
      const o=r.out||'(无输出)';
      ce.innerHTML='<span class="out">'+o.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')+'</span>';
      check(o.trim());
    }else{
      ce.innerHTML='<span class="err">'+trErr(r.err).replace(/\n/g,'<br>')+'</span>';
      document.getElementById('nextBtn').disabled=true;
      document.getElementById('nextBtn2').disabled=true;
    }
    updateStats();
  },120);
}

function check(o){
  const c=C[cur],ex=c.ans,ce=document.getElementById('conEl');
  if(!ex||!ex.t){return}
  let pass=ex.t==='exact'?o===ex.v:o.includes(ex.v);
  if(!pass&&ex.t==='contains'&&[9,10].includes(cur+1)&&o.length>8) pass=***
  if(pass&&cur>=prog.done){
    prog.done=cur+1;totalOK++;save();
    document.getElementById('nextBtn').disabled=false;
    document.getElementById('nextBtn2').disabled=false;
    document.getElementById('badgePct').textContent=prog.done+'/20';
    ce.innerHTML+='\n\n<span class="ok">🎉 太棒了！通过了！</span>';
    confetti();
    checkAch();
    setTimeout(()=>{renderChips();renderChips();renderAch();if(window.innerWidth<768){swTab('lesson');document.getElementById('panel-lesson').scrollTop=0}},400);
  }else if(pass){
    document.getElementById('nextBtn').disabled=false;
    document.getElementById('nextBtn2').disabled=false;
    ce.innerHTML+='\n\n<span class="info">✅ 正确！</span>';
    checkAch();
  }else if(o){
    ce.innerHTML+='\n\n<span class="info">🤔 不太对？点"💡提示"看看</span>';
  }
}

function reset(){
  document.getElementById('codeEl').value=C[cur].code;updHL();
  document.getElementById('conEl').innerHTML='代码已重置';
  document.getElementById('nextBtn').disabled=cur+1>prog.done;
  document.getElementById('nextBtn2').disabled=cur+1>prog.done;
}

function hint(){
  const c=C[cur];let idx=prog.hints[cur]||0;
  if(idx>=c.hints.length) idx=0;
  hintUsed[cur]=***document.getElementById('conEl').innerHTML+='\n\n<span class="hint">💡 '+c.hints[idx]+'</span>';
  prog.hints[cur]=idx+1;save();
  if(prog.hints[cur]>=c.hints.length) prog.hints[cur]=0;
}

function next(){
  if(cur+1<C.length&&cur+1<=prog.done){loadLsn(cur+1);document.getElementById('panel-lesson').scrollTop=0;toast('已进入第'+(cur+2)+'课')}
}

function toggleAI(){document.getElementById('aiBox').classList.toggle('show')}
function askAI(){
  const q=document.getElementById('aiIn').value.trim(),msg=document.getElementById('aiMsg');
  if(!q)return;
  let a;
  const ql=q.toLowerCase();
  if(ql.includes('print'))a='print() 用来在屏幕上打印文字。用法：<br><code>print("你好")</code><br>文字必须用引号包起来！';
  else if(ql.includes('变量')||ql.includes('赋值'))a='变量像一个带名字的盒子：<br><code>name = "小明"</code><br>然后用 print(name) 查看。<br>注意：变量名不加引号！';
  else if(ql.includes('if')||ql.includes('判断'))a='if 语句让程序做选择：<br><code>if x > 10:<br>&nbsp;&nbsp;&nbsp;&nbsp;print("大于10")</code><br>记住：冒号和缩进！';
  else if(ql.includes('for')||ql.includes('循环'))a='for 循环重复执行代码：<br><code>for i in range(5):<br>&nbsp;&nbsp;&nbsp;&nbsp;print(i)</code><br>range(5) 生成 0,1,2,3,4';
  else if(ql.includes('函数')||ql.includes('def'))a='用 def 定义函数：<br><code>def greet():<br>&nbsp;&nbsp;&nbsp;&nbsp;print("你好")</code><br>然后用 greet() 来调用它。';
  else if(ql.includes('错误')||ql.includes('报错'))a='常见错误检查：<br>1. 引号是否成对？<br>2. 冒号写了吗？<br>3. 缩进是4个空格吗？<br>具体报错发我看看~';
  else if(ql.includes('列表'))a='列表用 []，比如：<br><code>nums = [1,2,3]</code><br>用 nums[0] 取第一个。<br>注意索引从 0 开始！';
  else if(ql.includes('字典'))a='字典用 {} 存储键值对：<br><code>d = {"name":"小明","age":18}</code><br>用 d["name"] 访问值。';
  else a='很好的问题！建议先看看当前课程的教程内容，或者试试点"💡 提示"按钮获取线索。多动手写代码是最快的进步方式~';
  msg.innerHTML='<b>Q:</b> '+q+'<br><br><b>A:</b> '+a;
  document.getElementById('aiIn').value='';
}

function updateStats(){
  document.getElementById('statRuns').textContent=totalRuns;
  document.getElementById('statDone').textContent=prog.done;

  document.getElementById('statAcc').textContent=acc;
}

// Dashboard
function openDash(){
  document.getElementById('dv1').textContent=totalRuns;

  document.getElementById('dv3').textContent=acc;

  let ph='';C.forEach((_,i)=>{ph+='<span'+(i<prog.done?' class="done"':'')+'>'+(i<prog.done?'✓':i+1)+'</span>'});

  document.getElementById('dashBg').classList.add('show');

function closeDash(){document.getElementById('dashBg').classList.remove('show')}
function calcStreak(){
  let n=parseInt(localStorage._streak||'0');
  let ld=parseInt(localStorage._lastDate||'0');
  let td=new Date().toDateString();let tdNum=Date.parse(td);
  if(!ld||tdNum-ld>86400000){n=1}else if(tdNum-ld>0&&tdNum-ld<=86400000){n++}
  localStorage._streak=n;localStorage._lastDate=tdNum;
  return n;
}

  {id:'first_run',nm:'初次运行',ic:'🚀',d:'运行了第一段代码',c:()=>totalRuns>=1},

function confetti(){
  const cf=document.getElementById('cfEl'),cs=['#fbbf24','#f472b6','#818cf8','#34d399','#fb923c'];

function toast(m){
  const el=document.createElement('div');el.className='toast';el.textContent=m;

}
