<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Python零基础学堂</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%; font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif; background:#f5f5f5; color:#333; -webkit-text-size-adjust:100%}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:900px;margin:0 auto}

/* Top */
.top{display:flex;align-items:center;gap:8px;padding:10px 16px;background:#fff;border-bottom:1px solid #eee;flex-shrink:0}
.top .logo{font-size:20px}
.top .title{font-size:15px;font-weight:700;color:#4f46e5}
.top .flex{flex:1}
.top .pct{font-size:12px;color:#10b981;font-weight:600;background:#ecfdf5;padding:4px 10px;border-radius:10px}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid #eee;background:#fff;flex-shrink:0}
.tabs button{flex:1;padding:12px;border:none;background:transparent;font-size:14px;font-weight:600;color:#999;cursor:pointer;position:relative;font-family:inherit}
.tabs button.on{color:#4f46e5}
.tabs button.on:after{content:'';position:absolute;bottom:0;left:30%;right:30%;height:2px;background:#4f46e5;border-radius:1px}

/* Body */
.body{flex:1;overflow-y:auto;padding:16px}

/* Lesson */
.lsn{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.lsn .chip{padding:6px 12px;border-radius:14px;font-size:12px;font-weight:600;border:1px solid #ddd;background:#fff;cursor:pointer;color:#666;font-family:inherit}
.lsn .chip.done{background:#d1fae5;border-color:#a7f3d0;color:#065f46}
.lsn .chip.on{background:#eef2ff;border-color:#4f46e5;color:#4f46e5}
.lsn .chip.lock{opacity:.4;pointer-events:none}

.hero{background:linear-gradient(135deg,#4338ca,#6366f1,#8b5cf6);border-radius:12px;padding:20px;color:#fff;margin-bottom:16px}
.hero h2{font-size:18px;margin-bottom:6px}
.hero p{font-size:13px;opacity:.9;line-height:1.6}

.c-section{margin-bottom:14px}
.c-section h3{font-size:15px;font-weight:700;color:#4f46e5;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.c-section p{font-size:14px;line-height:1.75;color:#555}
.c-section code.inline{background:#f0f0f0;color:#c7254e;padding:1px 5px;border-radius:3px;font-size:13px}
.c-section pre{background:#1e293b;color:#e2e8f0;padding:12px 14px;border-radius:8px;font-size:13px;line-height:1.6;overflow-x:auto;margin:8px 0;font-family:Consolas,monospace}
.c-section pre code{font-family:inherit}
.box{border-radius:8px;padding:12px 14px;margin:10px 0;font-size:13px;line-height:1.6;display:flex;gap:8px}
.box.tip{background:#ecfdf5;border:1px solid #a7f3d0;color:#065f46}
.box.warn{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
.box.info{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}
.box .box-icon{font-size:16px;flex-shrink:0}

.step{padding:10px 0;display:flex;gap:10px;align-items:start}
.step .sn{width:28px;height:28px;border-radius:50%;background:#4f46e5;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.step div:last-child{font-size:13px}
.step div:last-child strong{display:block;margin-bottom:2px}

/* Editor */
.editor{background:#1e293b;border-radius:10px;overflow:hidden;margin-bottom:10px;flex-shrink:0}
.editor .ed-top{display:flex;align-items:center;padding:8px 14px;background:#0f172a;border-bottom:1px solid #334155}
.editor .ed-top .fn{font-size:11px;color:#94a3b8;font-weight:600;font-family:Consolas,monospace}
.editor .ed-top .dot{width:7px;height:7px;border-radius:50%;background:#10b981;display:inline-block;margin-right:5px}
.editor .ed-top .flex{flex:1}
.editor textarea{width:100%;min-height:140px;background:transparent;color:#e2e8f0;border:none;outline:none;padding:14px;font-family:Consolas,monospace;font-size:14px;line-height:1.6;resize:vertical;tab-size:4;caret-color:#facc15}
.editor textarea::placeholder{color:#475569}

.btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.btns button{padding:10px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
.btns button:active{transform:scale(.96)}
.btn-run{background:linear-gradient(135deg,#10b981,#059669);color:#fff}
.btn-reset{background:#475569;color:#e2e8f0}
.btn-hint{background:#78350f;color:#fde68a}
.btn-next{background:linear-gradient(135deg,#4f46e5,#6366f1);color:#fff}
.btns button:disabled{opacity:.35;pointer-events:none}

.console{background:#080d14;color:#94a3b8;border-radius:8px;padding:12px 14px;font-family:Consolas,monospace;font-size:13px;line-height:1.6;min-height:80px;max-height:200px;overflow-y:auto;white-space:pre-wrap;margin-bottom:16px}
.console .c-out{color:#a7f3d0}
.console .c-err{color:#fda4af}
.console .c-info{color:#93c5fd}
.console .c-ok{color:#34d399;font-weight:700}
.console .c-hint{color:#fde68a}

.theme-btn{position:fixed;bottom:20px;right:20px;width:44px;height:44px;border-radius:50%;background:#fff;border:1px solid #ddd;font-size:20px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.15);z-index:100;display:flex;align-items:center;justify-content:center}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:200;pointer-events:none;animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.dark-mode{background:#0f172a;color:#e2e8f0}
.dark-mode .top{background:#1e293b;border-color:#334155}
.dark-mode .tabs{background:#1e293b;border-color:#334155}
.dark-mode .lsn .chip{background:#1e293b;border-color:#334155;color:#94a3b8}
.dark-mode .lsn .chip.done{background:#064e3b;border-color:#065f46;color:#6ee7b7}
.dark-mode .lsn .chip.on{background:#312e81;border-color:#4f46e5;color:#a5b4fc}
.dark-mode .c-section p{color:#94a3b8}
.dark-mode .c-section h3{color:#818cf8}
.dark-mode .c-section code.inline{background:#1e293b;color:#f472b6}
.dark-mode .theme-btn{background:#1e293b;border-color:#334155}
.dark-mode .btns button{color:#e2e8f0}

/* Desktop */
@media(min-width:768px){
  .app{flex-direction:row;flex-wrap:wrap}
  .top{width:100%}
  .tabs{display:none}
  .body{width:50%;border-right:1px solid #eee}
  .dark-mode .body{border-color:#334155}
  .right{width:50%;display:flex;flex-direction:column;padding:16px;gap:8px;overflow-y:auto}
  .lsn{flex-direction:column;margin-bottom:0}
}
</style>
</head>
<body id="bodyEl">
<div class="app" id="appEl">
  <div class="top">
    <span class="logo">🐍</span>
    <span class="title">Python零基础学堂</span>
    <span class="flex"></span>
    <span class="pct" id="pct">0/20</span>
  </div>
  <div class="tabs" id="tabsEl">
    <button class="on" id="tabLsn" onclick="showTab('content')">📚 课程</button>
    <button id="tabEd" onclick="showTab('editor')">💻 写代码</button>
  </div>
  <div class="body" id="contentBody"></div>
  <div class="right" id="rightPanel">
    <div class="editor" id="editorEl">
      <div class="ed-top"><span class="fn"><span class="dot"></span>main.py</span></div>
      <textarea id="codeIn" placeholder="# 在这里写 Python 代码..." spellcheck="false"></textarea>
    </div>
    <div class="btns">
      <button class="btn-run" onclick="runCode()">▶ 运行</button>
      <button class="btn-reset" onclick="resetCode()">↺ 重置</button>
      <button class="btn-hint" onclick="showHint()" id="hintBtn">💡 提示</button>
      <span class="flex" style="flex:1"></span>
      <button class="btn-next" onclick="nextLesson()" id="nextBtn" disabled>下一课 →</button>
    </div>
    <div class="console" id="consoleEl">点击 ▶ 运行 执行代码</div>
  </div>
</div>
<div class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙</div>
<div id="toastC"></div>

<script>
const courses=[
  {id:1,title:"你好，Python！",
   html:'<div class="hero"><h2>✨ 欢迎来到 Python 编程世界</h2><p>零基础入门，20节课从 print() 到完整项目。每课都有讲解和动手练习。</p></div><div class="c-section"><h3>什么是 print()？</h3><p><code class="inline">print()</code> 是 Python 最常用的函数，在屏幕上显示文字。</p><pre><code>print(\'你好，世界！\')</code></pre></div><div class="box warn"><span class="box-icon">⚠️</span><span>文字必须用引号包起来！单引号或双引号都可以。</span></div><div class="c-section"><h3>✏️ 练习</h3><p>把引号里改成 <strong>"你好"</strong>，点运行！</p></div>',
   code:"# 在引号里写上：你好\nprint('')",
   expect:{type:"contains",val:"你好"},
   hints:["把 你好 写在 print() 的引号里","例如：print('你好')"],
   steps:[
    {t:"观察",d:"看看示例代码，猜猜它会输出什么？"},
    {t:"模仿",d:"在编辑器里抄一遍 print('你好，世界！')"},
    {t:"修改",d:"把引号里的文字改成你自己的话"},
    {t:"创造",d:"写多行 print() 打印不同的内容"}
   ]},
  {id:2,title:"变量是个盒子",
   html:'<div class="c-section"><h3>变量是个盒子</h3><p>变量像有名字的盒子，把数据放进去。</p><pre><code>name = \'小明\'\nage = 18\nprint(name)\nprint(age)</code></pre></div><div class="box tip"><span class="box-icon">💡</span><span>一个 <code class="inline">=</code> 赋值，两个 <code class="inline">==</code> 比较。别搞混！</span></div><div class="c-section"><h3>✏️ 练习</h3><p>创建 <code class="inline">score = 100</code>，打印它。</p></div>',
   code:"# 创建变量 score = 100\n# 打印\n",
   expect:{type:"exact",val:"100"},
   hints:["score = 100","print(score) — 不加引号"],
   steps:[{t:"理解",d:"变量像标签贴在数据上"},{t:"赋值",d:"score = 100"},{t:"使用",d:"print(score)"},{t:"体验",d:"建更多变量试试"}]
  },
  {id:3,title:"让程序做选择",
   html:'<div class="c-section"><h3>让程序做选择</h3><p><code class="inline">if</code> 让程序根据条件走不同分支。</p><pre><code>score = 85\nif score >= 60:\n    print(\'及格了！\')\nelse:\n    print(\'还需要努力\')</code></pre></div><div class="box warn"><span class="box-icon">⚠️</span><span>if 后写冒号 : ，下一行缩进4个空格！</span></div><div class="c-section"><h3>✏️ 练习</h3><p><code class="inline">temperature = 30</code>，大于25打印"好热"，否则"好凉快"。</p></div>',
   code:"temperature = 30\n# 写 if 判断\n",
   expect:{type:"exact",val:"好热"},
   hints:["if temperature > 25:","缩进写 print('好热')"],
   steps:[{t:"理解",d:'"如果…就…"的逻辑'},{t:"体验",d:"写 if temperature > 25:"},{t:"编写",d:"缩进 print"},{t:"测试",d:"改成20看变化"}]
  },
  {id:4,title:"重复交给循环",
   html:'<div class="c-section"><h3>for 循环</h3><p><code class="inline">for</code> 重复执行代码。</p><pre><code>for i in range(5):\n    print(i)</code></pre><p>打印 0,1,2,3,4。</p></div><div class="box info"><span class="box-icon">📖</span><span><code class="inline">range(5)</code> 生成0到4。<code class="inline">range(1,6)</code> 生成1到5。</span></div><div class="c-section"><h3>✏️ 练习</h3><p>用 for 打印 1 到 5。</p></div>',
   code:"# 用 for 循环打印 1 到 5\n",
   expect:{type:"exact",val:"1\n2\n3\n4\n5"},
   hints:["for i in range(1, 6):","缩进 print(i)"],
   steps:[{t:"理解",d:"for 像复读机"},{t:"计数",d:"range(1,6) 1到5"},{t:"编写",d:"for i in range(1,6): print(i)"},{t:"探索",d:"range(1,101)"}]
  },
  {id:5,title:"函数：打包代码",
   html:'<div class="c-section"><h3>函数</h3><p><code class="inline">def</code> 定义可重复调用的代码。</p><pre><code>def say_hello():\n    print(\'你好！\')\n\nsay_hello()</code></pre></div><div class="box tip"><span class="box-icon">💡</span><span>先定义（def），再调用（名字+括号）。</span></div><div class="c-section"><h3>✏️ 练习</h3><p>定义 <code class="inline">greet()</code>，打印"欢迎学习Python！"。</p></div>',
   code:"# 定义函数 greet()\n# 然后调用\n",
   expect:{type:"exact",val:"欢迎学习Python！"},
   hints:["def greet():","print('欢迎学习Python！')","greet() 调用"],
   steps:[{t:"理解",d:"函数像小助手"},{t:"定义",d:"def greet():"},{t:"调用",d:"greet()"},{t:"创造",d:"自定义函数"}]
  },
  {id:6,title:"列表：一排盒子",
   html:'<div class="c-section"><h3>列表</h3><p>列表用 <code class="inline">[]</code> 存多个数据。</p><pre><code>fruits = [\'苹果\', \'香蕉\', \'橙子\']\nprint(fruits[0])  # 苹果\nfruits.append(\'葡萄\')</code></pre></div><div class="box info"><span class="box-icon">📖</span><span>索引从 <strong>0</strong> 开始！[0]是第一个。</span></div><div class="c-section"><h3>✏️ 练习</h3><p>创建 <code class="inline">colors = [\'红\', \'绿\', \'蓝\']</code>，打印第二个。</p></div>',
   code:"# 创建 colors 列表\n# 打印第二个（索引1）\n",
   expect:{type:"exact",val:"绿"},
   hints:["colors = ['红', '绿', '蓝']","print(colors[1])"],
   steps:[{t:"理解",d:"列表像编号储物柜，从0起"},{t:"创建",d:"colors = ['红','绿','蓝']"},{t:"访问",d:"print(colors[1])"},{t:"探索",d:".append() 添加"}]
  },
  {id:7,title:"字典：带标签",
   html:'<div class="c-section"><h3>字典</h3><p>字典用 <code class="inline">{}</code> 键值对存储。</p><pre><code>student = {\'name\': \'小明\', \'age\': 18}\nprint(student[\'name\'])</code></pre></div><div class="box tip"><span class="box-icon">💡</span><span>字典用名字索引，列表用数字。</span></div><div class="c-section"><h3>✏️ 练习</h3><p>创建 <code class="inline">book = {\'title\': \'Python入门\', \'price\': 39}</code>，打印书名。</p></div>',
   code:"# 创建字典 book\n# 打印书名\n",
   expect:{type:"exact",val:"Python入门"},
   hints:["book = {'title': 'Python入门', 'price': 39}","print(book['title'])"],
   steps:[{t:"理解",d:"字典像查字典：键→值"},{t:"创建",d:"book = {...}"},{t:"访问",d:"book['title']"},{t:"创造",d:"建自己的字典"}]
  },
  {id:8,title:"字符串的魔法",
   html:'<div class="c-section"><h3>字符串方法</h3><pre><code>text = \'hello world\'\nprint(text.upper())          # HELLO WORLD\nprint(text.replace(\'world\', \'Python\'))\nprint(len(text))             # 11</code></pre></div><div class="box info"><span class="box-icon">📖</span><span>方法用 <code class="inline">.</code> 调用。text.upper() 变大写。</span></div><div class="c-section"><h3>✏️ 练习</h3><p><code class="inline">s = \'python\'</code>，变大写打印。</p></div>',
   code:"# s = 'python'\n# 变大写打印\n",
   expect:{type:"exact",val:"PYTHON"},
   hints:["s = 'python'","print(s.upper())"],
   steps:[{t:"理解",d:"方法是数据自带工具"},{t:"尝试",d:"s.upper()"},{t:"组合",d:"一行搞定"},{t:"探索",d:".replace() .count()"}]
  },
  {id:9,title:"项目：猜数字",
   html:'<div class="c-section"><h3>🎯 猜数字游戏</h3><p>综合之前所学！目标数字是 7。</p><pre><code>secret = 7\nguess = int(input(\'猜一个数字：\'))\nif guess > secret:\n    print(\'太大了\')\nelif guess < secret:\n    print(\'太小了\')\nelse:\n    print(\'猜对了！\')</code></pre></div><div class="box warn"><span class="box-icon">⚠️</span><span>运行后弹出输入框，输入7。</span></div><div class="c-section"><h3>✏️ 练习</h3><p>完成代码，输入7显示"猜对了！"。</p></div>',
   code:"secret = 7\nguess = int(input('猜一个数字：'))\nif guess > secret:\n    print('太大了')\nelif guess < secret:\n    print('太小了')\nelse:\n    print('猜对了！')\n",
   expect:{type:"contains",val:"猜对了"},
   hints:["运行后输入7","if...elif...else"],
   steps:[{t:"回顾",d:"变量+input+if+print"},{t:"运行",d:"输入7"},{t:"测试",d:"输入8和6"},{t:"改进",d:"用random.randint"}]
  },
  {id:10,title:"项目：计算器",
   html:'<div class="c-section"><h3>🧮 简易计算器</h3><p>输入两个数，算和差积商。</p><pre><code>a = float(input(\'输入第一个数：\'))\nb = float(input(\'输入第二个数：\'))\nprint(\'和:\', a + b)\nprint(\'差:\', a - b)\nprint(\'积:\', a * b)\nprint(\'商:\', a / b)</code></pre></div><div class="c-section"><h3>✏️ 练习</h3><p>获取两个数，打印和差积商。试试10和2！</p></div>',
   code:"# 获取两个数字\n# 打印和差积商\n",
   expect:{type:"contains",val:""},
   hints:["a = float(input('第一个数：'))","print('和差积商：', a+b, a-b, a*b, a/b)"],
   steps:[{t:"思考",d:"input→float→运算→print"},{t:"编写",d:"获取a,b"},{t:"测试",d:"10和2"},{t:"升级",d:"加除以0判断"}]
  },
  {id:11,title:"文件读写",
   html:'<div class="c-section"><h3>📄 文件读写</h3><pre><code># 写入\nwith open(\'日记.txt\', \'w\') as f:\n    f.write(\'你好，世界！\')\n\n# 读取\nwith open(\'日记.txt\', \'r\') as f:\n    print(f.read())</code></pre></div><div class="box info"><span class="box-icon">📖</span><span>\'w\' 覆盖写入，\'r\' 只读，\'a\' 追加。with 自动关闭文件。</span></div><div class="c-section"><h3>✏️ 练习</h3><p>用 with open 写入"文件测试"并读取打印。</p></div>',
   code:"with open('test.txt', 'w') as f:\n    f.write('文件测试')\nwith open('test.txt', 'r') as f:\n    print(f.read())\n",
   expect:{type:"contains",val:"文件测试"},
   hints:["with open('test.txt','w') as f:","f.write('文件测试')"],
   steps:[{t:"理解",d:"文件是永久保存的变量"},{t:"写入",d:"with...as f: f.write()"},{t:"读取",d:"f.read()"},{t:"探索",d:"readlines()"}]
  },
  {id:12,title:"异常处理",
   html:'<div class="c-section"><h3>🛡️ try/except</h3><pre><code>try:\n    num = int(input(\'输入数字：\'))\n    print(\'你输入了：\', num)\nexcept ValueError:\n    print(\'请输入有效数字！\')</code></pre></div><div class="box tip"><span class="box-icon">💡</span><span>try 放可能出错的代码，except 捕获异常。</span></div><div class="c-section"><h3>✏️ 练习</h3><p>处理除零错误，打印"不能除以零！"。</p></div>',
   code:"try:\n    result = 10 / 0\n    print(result)\nexcept ZeroDivisionError:\n    print('不能除以零！')\n",
   expect:{type:"contains",val:"不能除以零"},
   hints:["try 里放 10 / 0","except ZeroDivisionError:"],
   steps:[{t:"理解",d:"异常是运行时错误"},{t:"捕获",d:"try/except"},{t:"练习",d:"除零"},{t:"探索",d:"多个except"}]

let cur=0,mode='learn',prog={done:0,hints:{}},runN=0,hintI=0,totalRuns=0;
function ld(){try{let p=JSON.parse(localStorage.pl2||'{}');if(p.done!=null)prog=p}catch(e){}}
function sv(){localStorage.pl2=JSON.stringify(prog)}

function setMode(m){mode=m;loadLsn(cur)}

function showTab(t){
  document.getElementById('tabLsn').classList.toggle('on',t==='content');
  document.getElementById('tabEd').classList.toggle('on',t==='editor');
  document.getElementById('contentBody').style.display=t==='content'?'block':'none';
  document.getElementById('rightPanel').style.display=t==='editor'?'flex':'none';
  if(t==='editor') document.getElementById('codeIn').focus();
}

let isDark=false;
function toggleTheme(){
  isDark=!isDark;
  document.getElementById('bodyEl').classList.toggle('dark-mode',isDark);
  document.getElementById('themeBtn').textContent=isDark?'☀️':'🌙';
  localStorage.theme=isDark?'dark':'light';
}
document.getElementById('bodyEl').classList.toggle('dark-mode',localStorage.theme==='dark');
isDark=localStorage.theme==='dark';
document.getElementById('themeBtn').textContent=isDark?'☀️':'🌙';

function loadLsn(i){
  cur=i;hintI=prog.hints[i]||0;
  const c=courses[i];
  let html;
  if(mode==='learn'){
    html=c.html;
  }else{
    html=`<h3 style="margin-bottom:12px">📖 ${c.title} — 跟着走</h3>`;
    c.steps.forEach((s,si)=>html+=`<div class="step"><div class="sn">${si+1}</div><div><strong>${s.t}</strong>${s.d}</div></div>`);
    html+='<div class="box tip"><span class="box-icon">💡</span><span>完成后切换到<strong>编辑</strong>动手试试！</span></div>';
  }
  document.getElementById('contentBody').innerHTML=html;
  document.getElementById('codeIn').value=c.code;
  document.getElementById('consoleEl').innerHTML='点击 ▶ 运行 执行代码';
  document.getElementById('nextBtn').disabled=i+1>prog.done;
  document.getElementById('hintBtn').textContent='💡 提示('+(c.hints.length-hintI)+')';
  document.getElementById('hintBtn').disabled=hintI>=c.hints.length;
  renderChips();
  document.getElementById('pct').textContent=prog.done+'/20';
}

function renderChips(){
  const el=document.getElementById('contentBody');
  const existing=el.querySelector('.lsn');
  let chips='<div class="lsn">';
  courses.forEach((c,i)=>{
    let cls='chip';
    if(i<prog.done) cls+=' done';
    if(i===cur) cls+=' on';
    if(i>prog.done) cls+=' lock';
    const icon=i<prog.done?'✓':(c.title.slice(0,2));
    chips+=`<span class="${cls}" onclick="loadLsn(${i});document.getElementById('contentBody').scrollTop=0">${icon} ${c.title}</span>`;
  });
  chips+='</div>';
  el.insertAdjacentHTML('afterbegin',chips);
}

function execPy(code){
  let p=code.replace(/#.*/g,'').replace(/print\((.*)\)/g,'_p($1)');
  p=p.replace(/input\((.*)\)/g,'_in($1)');
  p=p.replace(/int\((.*)\)/g,'parseInt($1)');
  p=p.replace(/float\((.*)\)/g,'parseFloat($1)');
  p=p.replace(/(\w+)\.append\((.*)\)/g,'$1.push($2)');
  p=p.replace(/(\w+)\.upper\(\)/g,'$1.toUpperCase()');
  p=p.replace(/(\w+)\.lower\(\)/g,'$1.toLowerCase()');
  p=p.replace(/(\w+)\.replace\(([^,]+),\s*([^)]+)\)/g,'$1.replaceAll($2,$3)');
  p=p.replace(/range\((\d+),\s*(\d+)\)/g,'Array.from({length:$2-$1},(_,i)=>i+$1)');
  p=p.replace(/range\((\d+)\)/g,'Array.from({length:$1},(_,i)=>i)');
  p=p.replace(/len\((\w+)\)/g,'$1.length');
  p=p.replace(/elif /g,'else if ');
  p=p.replace(/def (\w+)\(([^)]*)\):/g,'function $1($2){');
  p=p.replace(/:$/gm,'{');
  p=p.replace(/True/g,'true');p=p.replace(/False/g,'false');
  p=p.replace(/None/g,'null');p=p.replace(/\band\b/g,'&&');p=p.replace(/\bor\b/g,'||');
  p=p.replace(/for (\w+) in (\w+):/g,'for(let $1 of $2){');
  p=p.replace(/import random\n?/g,'');
  p=p.replace(/random\.randint\((\d+),(\d+)\)/g,'Math.floor(Math.random()*($2-$1+1))+$1');
  let bc=0;const ls=p.split('\n').map(l=>{if(!l.trim())return l;bc+=(l.match(/\{/g)||[]).length;bc-=(l.match(/\}/g)||[]).length;return l});
  for(let i=0;i<bc;i++)ls.push('}');
  p=ls.join('\n');
  const sb='const _o=[];const _p=(...a)=>_o.push(a.join(" "));const _in=p=>{let v=prompt(p||"输入：","");return v===null?"":v};try{'+p+'}catch(e){_o.push("ERR:"+e.message)}return _o.join("\\n");';
  try{const fn=new Function(sb);const r=fn();return r.startsWith('ERR:')?{ok:false,err:r.slice(4)}:{ok:true,out:r}}
  catch(e){return{ok:false,err:e.message}}
}
function trErr(m){
  const t=[{p:/SyntaxError|unexpected/i,m:'语法错误：检查括号引号冒号',tip:'if后写冒号，括号成对'},
  {p:/not defined/i,m:'名称错误：变量没定义或拼错',tip:'先赋值再用'},
  {p:/cannot read|null/i,m:'属性错误：方法不存在',tip:'数字没有.upper()'},
  {p:/infinite/i,m:'可能无限循环',tip:'检查range()'},
  {p:/zero/i,m:'除零错误',tip:'分母不能是0'},
  {p:/NaN/i,m:'数值错误',tip:'用int()或float()转换'}];
  for(let e of t)if(e.p.test(m))return'❌ '+e.m+'\n💡 '+e.tip;
  return'❌ '+m.split('\n')[0]+'\n💡 检查代码';
}

function runCode(){
  const code=document.getElementById('codeIn').value.trim();
  const ce=document.getElementById('consoleEl');
  if(!code){ce.innerHTML='<span class="c-err">请先输入代码</span>';return}
  ce.innerHTML='⏳ 运行中...';
  setTimeout(()=>{
    runN++;totalRuns++;
    const r=execPy(code);
    if(r.ok){
      const o=r.out||'(无输出)';
      ce.innerHTML='<span class="c-out">'+o.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')+'</span>';
      check(o.trim());
    }else{
      ce.innerHTML='<span class="c-err">'+trErr(r.err).replace(/\n/g,'<br>')+'</span>';
      document.getElementById('nextBtn').disabled=true;
    }
  },100);
}

function check(o){
  const c=courses[cur],ex=c.expect,ce=document.getElementById('consoleEl');
  let pass=ex.type==='exact'?o===ex.val:o.includes(ex.val);
  if(!pass&&(cur===9||cur===10)&&o.length>10) pass=true;
  if(pass&&cur>=prog.done){
    prog.done=cur+1;sv();
    document.getElementById('nextBtn').disabled=false;
    document.getElementById('pct').textContent=prog.done+'/20';
    ce.innerHTML+='<br><br><span class="c-ok">🎉 太棒了！通过了！</span>';
    spawnConfetti();
    setTimeout(()=>{renderChips();if(window.innerWidth<768)showTab('content')},500);
  }else if(pass){
    document.getElementById('nextBtn').disabled=false;
    ce.innerHTML+='<br><br><span class="c-info">✅ 正确！</span>';
  }else if(o){
    ce.innerHTML+='<br><br><span class="c-info">🤔 不太对？点"提示"看看</span>';
  }
}

function resetCode(){
  document.getElementById('codeIn').value=courses[cur].code;
  document.getElementById('consoleEl').innerHTML='代码已重置';
  document.getElementById('nextBtn').disabled=cur+1>prog.done;
  runN=0;
}

function showHint(){
  const c=courses[cur];
  let idx=prog.hints[cur]||0;
  if(idx>=c.hints.length) idx=0; // 循环：用完回到第一条
  document.getElementById('consoleEl').innerHTML+='\n\n<span class="c-hint">💡 提示：'+c.hints[idx]+'</span>';
  prog.hints[cur]=idx+1;sv();hintI=idx+1;
  if(hintI>=c.hints.length) prog.hints[cur]=0; // 下次从头循环
  document.getElementById('hintBtn').textContent='💡 提示(♾)';
  document.getElementById('hintBtn').disabled=false;
}

function nextLesson(){
  if(cur+1<courses.length&&cur+1<=prog.done){
    loadLsn(cur+1);
    document.getElementById('contentBody').scrollTop=0;
  }
}

function spawnConfetti(){
  const colors=['#fbbf24','#f472b6','#818cf8','#34d399','#fb923c'];
  for(let i=0;i<30;i++){
    const el=document.createElement('div');
    Object.assign(el.style,{
      position:'fixed',zIndex:999,pointerEvents:'none',
      left:Math.random()*100+'%',top:'-10px',
      width:8+Math.random()*8+'px',height:8+Math.random()*8+'px',
      background:colors[i%5],borderRadius:'2px',
      animation:'confettiDrop '+(1.5+Math.random()*1.5)+'s ease-out '+Math.random()*0.5+'s forwards'
    });
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2500);
  }
}

function toast(msg){
  const el=document.createElement('div');
  el.className='toast';el.textContent=msg;
  document.getElementById('toastC').appendChild(el);
  setTimeout(()=>el.remove(),1500);
}

// Keyboard
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();runCode()}
});

// Init
ld();
cur=Math.min(prog.done,courses.length-1);
document.getElementById('pct').textContent=prog.done+'/20';
loadLsn(cur);
showTab('content');
</script>
